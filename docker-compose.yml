services:
  postgres-db:
    image: postgres:16-alpine
    container_name: crm-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      POSTGRES_DB: crm_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crm_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: crm-frontend
    container_name: crm-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4200
    expose:
      - "4200"

volumes:
  postgres_data:
