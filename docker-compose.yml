services:
  postgres-db:
    image: postgres:16-alpine
    container_name: crm-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      POSTGRES_DB: crm_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crm_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: crm-backend
    container_name: crm-backend
    restart: unless-stopped
    depends_on:
      postgres-db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # sovrascrivono i valori di backend/.env: dentro la rete docker il database e' raggiungibile
      # come "postgres-db:5432" (porta interna, non l'host-mapped 5433) con le credenziali del
      # servizio postgres-db sopra, non quelle del Postgres locale usato da bootRun
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/crm_db
      DB_USERNAME: user
      DB_PASSWORD: user
      CORS_ALLOWED_ORIGINS: http://localhost:4200
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: crm-frontend
    container_name: crm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 4200
    expose:
      - "4200"

volumes:
  postgres_data:
