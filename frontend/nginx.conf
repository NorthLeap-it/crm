server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA Angular: ogni rotta lato client (es. /o/contact, /settings) deve servire index.html,
    # il router Angular si occupa del resto. Senza questo, un refresh su una rotta profonda
    # darebbe 404 da nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # asset con hash nel nome: cache lunga
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
