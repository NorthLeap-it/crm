<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Frontend</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="logo_minimale_con_bussola_stilizzata-removebg-preview.png">
  <script>
    // applicato prima del bootstrap di Angular per evitare un flash del tema sbagliato -
    // ThemeService (src/app/services/theme.service.ts) prende il controllo dopo, stessa chiave
    // localStorage
    (function () {
      var stored = localStorage.getItem('theme');
      var theme = (stored === 'light' || stored === 'dark')
        ? stored
        : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
