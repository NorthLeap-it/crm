<div>
  <form [formGroup]="form" (ngSubmit)="save()" class="border border-base-300 rounded-sm p-4 max-w-xl space-y-3">
    <div>
      <label class="block text-sm mb-1">Nome azienda <span class="text-error">*</span></label>
      <input type="text" formControlName="name" class="input rounded-sm w-full" placeholder="La mia azienda" />
    </div>

    <div>
      <label class="block text-sm mb-1">Colore brand</label>
      <div class="flex items-center gap-2">
        <input type="color" formControlName="brandColor"
               class="h-10 w-14 rounded-sm border border-base-300 bg-base-100 p-1 cursor-pointer" />
        <span class="text-sm text-base-content/60">{{ form.controls.brandColor.value }}</span>
      </div>
    </div>

    <div>
      <label class="block text-sm mb-1">URL logo</label>
      <input type="text" formControlName="logoUrl" class="input rounded-sm w-full" placeholder="https://.../logo.png" />
    </div>

    <ui-button type="submit" variant="primary" [loading]="submitting()">Salva</ui-button>
  </form>

  @if (error()) {
    <div class="alert alert-error rounded-sm py-2 text-sm mt-4 max-w-xl">{{ error() }}</div>
  }
  @if (saved()) {
    <div class="alert alert-success rounded-sm py-2 text-sm mt-4 max-w-xl">Impostazioni azienda salvate.</div>
  }
</div>
