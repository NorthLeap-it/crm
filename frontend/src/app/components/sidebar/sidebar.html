<label for="app-drawer" class="drawer-overlay"></label>
<aside class="bg-base-100 border-r border-base-300 w-64 min-h-full flex flex-col">
  <div class="p-4 text-sm font-semibold text-base-content/50 uppercase tracking-wide">Oggetti</div>
  <ul class="menu px-2 gap-0.5">
    @for (obj of objects(); track obj.id) {
      @if (obj.enabled) {
        <li>
          <a [routerLink]="['/o', obj.key]" routerLinkActive="active" class="rounded-sm">
            <lucide-icon [img]="iconFor(obj)" [size]="16" [style.color]="obj.color" />
            {{ obj.pluralLabel }}
          </a>
        </li>
      }
    }
  </ul>
  <div class="mt-auto p-2 border-t border-base-300">
    <a routerLink="/settings" routerLinkActive="active" class="btn btn-ghost btn-sm rounded-sm w-full justify-start gap-2">
      <lucide-icon [img]="SettingsIcon" [size]="16" /> Impostazioni
    </a>
  </div>
</aside>
