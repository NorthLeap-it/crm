<header class="navbar bg-base-100 border-b border-base-300 sticky top-0 z-20 px-4">
  <div class="flex-none lg:hidden">
    <label for="app-drawer" class="btn btn-ghost btn-square rounded-sm">
      <span class="text-lg">☰</span>
    </label>
  </div>
  <div class="flex-1">
    <a routerLink="/" class="text-lg font-semibold px-2">NorthLeap</a>
  </div>
  <div class="flex-none flex items-center gap-1">
    <button class="btn btn-ghost btn-square rounded-sm" (click)="toggleTheme()" [attr.aria-label]="isDark() ? 'Tema chiaro' : 'Tema scuro'">
      <lucide-icon [img]="isDark() ? SunIcon : MoonIcon" [size]="18" />
    </button>

    <div class="dropdown dropdown-end">
      <button tabindex="0" class="btn btn-ghost btn-square rounded-sm relative" aria-label="Notifiche">
        <lucide-icon [img]="BellIcon" [size]="18" />
        @if (unreadCount() > 0) {
          <span class="badge badge-error badge-xs absolute top-1 right-1">{{ unreadCount() }}</span>
        }
      </button>
      <div tabindex="0" class="dropdown-content bg-base-100 rounded-sm border border-base-300 z-30 w-80 p-0 shadow">
        <div class="flex items-center justify-between p-3 border-b border-base-300">
          <span class="font-semibold text-sm">Notifiche</span>
          @if (unreadCount() > 0) {
            <button class="link link-primary text-xs" (click)="markAllRead()">Segna tutte lette</button>
          }
        </div>
        <ul class="max-h-80 overflow-y-auto">
          @for (n of notifications(); track n.id) {
            <li class="p-3 border-b border-base-200 last:border-0" [class.bg-base-200]="!n.readAt">
              <p class="text-sm font-medium">{{ n.title }}</p>
              @if (n.body) {
                <p class="text-xs text-base-content/60">{{ n.body }}</p>
              }
            </li>
          } @empty {
            <li class="p-4 text-center text-sm text-base-content/50">Nessuna notifica</li>
          }
        </ul>
      </div>
    </div>

    <div class="dropdown dropdown-end">
      <button tabindex="0" class="btn btn-ghost rounded-sm gap-2">
        <div class="avatar avatar-placeholder">
          <div class="bg-neutral text-neutral-content rounded-full w-8">
            <span class="text-xs">{{ (user()?.name ?? '?').charAt(0) }}</span>
          </div>
        </div>
        <span class="hidden sm:inline text-sm">{{ user()?.name }}</span>
      </button>
      <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-sm border border-base-300 z-30 w-48 p-1 shadow">
        <li><a routerLink="/settings"><lucide-icon [img]="SettingsIcon" [size]="16" /> Impostazioni</a></li>
        <li><button (click)="logout()"><lucide-icon [img]="LogOutIcon" [size]="16" /> Esci</button></li>
      </ul>
    </div>
  </div>
</header>
