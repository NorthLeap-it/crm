spring.application.name=backend

app.jwt.jwt_access_secret=${JWT_ACCESS_SECRET}
app.jwt.jwt_refresh_secret=${JWT_REFRESH_SECRET}
app.jwt.expiration-access-ms=900000
app.jwt.expiration-refresh-ms=2592000000
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.datasource.url=jdbc:postgresql://localhost:5432/crm_db

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Workflow engine (Fase 5): azione send_email via Resend. Niente default hardcoded per
# from-email (l'originale usa un dominio personale dell'autore come default letterale) - se
# vuota, l'azione si skippa, stesso esito pratico del caso "niente api-key" gia' previsto.
app.resend.api-key=${RESEND_API_KEY:}
app.resend.from-email=${RESEND_FROM_EMAIL:}

app.workflow.executor.core-pool-size=${WORKFLOW_EXECUTOR_CORE_POOL_SIZE:2}
app.workflow.executor.max-pool-size=${WORKFLOW_EXECUTOR_MAX_POOL_SIZE:8}
app.workflow.executor.queue-capacity=${WORKFLOW_EXECUTOR_QUEUE_CAPACITY:100}

# Files (Fase 6): stesso limite dell'originale (25 MB lato Multer)
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
app.files.upload-dir=${UPLOAD_DIR:./uploads}

# CORS: origini ammesse per il frontend, separate da virgola, mai wildcard (le richieste
# includono credenziali). Default per lo sviluppo locale Angular.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Rate limiting in-memory per IP su login/refresh/accept-invite (single-instance, vedi RateLimiter)
app.rate-limit.max-attempts=${RATE_LIMIT_MAX_ATTEMPTS:10}
app.rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:60}

# Cookie auth (access_token/refresh_token httpOnly, vedi AuthCookieService): "Secure" richiede
# HTTPS, va lasciato false in sviluppo locale (http://localhost) e messo a true in produzione.
app.security.cookie-secure=${COOKIE_SECURE:false}
app.security.cookie-samesite=${COOKIE_SAMESITE:Lax}